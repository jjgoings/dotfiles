# Risto-style prompt: (env) user@host:path ‹branch› $
add_newline = false
format = "$conda$username[@](fg:#928374)$hostname[:](fg:#928374)$directory$git_branch$character"

[conda]
format = "[\\($environment\\)]($style) "
style = "fg:#ff6b6b"
symbol = ""
ignore_base = false

[username]
format = "[$user]($style)"
style_user = "fg:#ff9f43"
style_root = "fg:#ff6b6b"
show_always = true

[hostname]
format = "[$hostname]($style)"
style = "fg:#ffd166"
ssh_only = false

[directory]
format = "[$path]($style) "
style = "fg:#98c379"
truncation_length = 2
truncate_to_repo = false

[git_branch]
format = "[‹$branch›]($style) "
style = "fg:#5ea1ff"

[character]
success_symbol = "[\\$](fg:#98c379)"
error_symbol = "[\\$](fg:#ff6b6b)"

# Disable things risto doesn't show
[git_status]
disabled = true

[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[cmd_duration]
disabled = true
